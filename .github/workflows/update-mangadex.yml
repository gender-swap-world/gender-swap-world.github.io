name: Sync Full GenderSwap VN Manga

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch & Sync Manga + Chapters
        run: |
          cat > sync.js << 'EOF'
          const fs = require('fs').promises;
          const axios = require('axios');

          const TAG_ID = 'df4de92c-07ea-4af0-b794-2f7d9ec2acdb';

          async function fetchChapters(mangaId) {
            try {
              const res = await axios.get('https://api.mangadex.org/manga/' + mangaId + '/feed', {
                params: {
                  translatedLanguage: ['vi'],
                  limit: 500,
                  order: { chapter: 'asc' }
                },
                headers: { 'User-Agent': 'GenBen-Updater/1.0' }
              });

              const chapters = [];
              for (const ch of res.data.data) {
                const imagesRes = await axios.get(`https://api.mangadex.org/at-home/server/${ch.id}`, {
                  headers: { 'User-Agent': 'GenBen-Updater/1.0' }
                });

                const images = imagesRes.data.chapter.data.map(
                  img => imagesRes.data.baseUrl + '/data/' + imagesRes.data.chapter.hash + '/' + img
                );

                chapters.push({                  id: parseInt(ch.attributes.chapter) || chapters.length + 1,
                  name: `Chapter ${ch.attributes.chapter || chapters.length + 1}: ${ch.attributes.title || ''}`,
                  pages: images
                });
              }
              return chapters;
            } catch (e) {
              return [];
            }
          }

          async function main() {
            console.log('🚀 Starting sync...');

            const res = await axios.get('https://api.mangadex.org/manga', {
              params: {
                includedTags: [TAG_ID],
                availableTranslatedLanguage: ['vi'],
                limit: 100,
                includes: ['cover_art'],
                order: { createdAt: 'desc' }
              },
              headers: { 'User-Agent': 'GenBen-Updater/1.0' }
            });

            if (res.data.data.length === 0) {
              console.log('ℹ️ No manga found matching criteria.');
              return;
            }

            let data;
            try {
              data = JSON.parse(await fs.readFile('data.json', 'utf8'));
            } catch {
              data = { comics: [] };
            }

            const existingMap = new Map(data.comics.map(c => [c.id, c]));
            let addedManga = 0;
            let updatedManga = 0;

            for (const m of res.data.data) {
              const id = 'md_' + m.id;
              const cover = m.relationships.find(r => r.type === 'cover_art');
              const coverUrl = cover 
                ? `https://uploads.mangadex.org/covers/${m.id}/${cover.attributes.fileName}.256.jpg`
                : 'https://placehold.co/300x400/444/ccc?text=No+Image';

              const chapters = await fetchChapters(m.id);
              if (existingMap.has(id)) {
                const existingComic = existingMap.get(id);
                const existingChapterIds = new Set(existingComic.chapters.map(c => c.id));
                const newChapters = chapters.filter(ch => !existingChapterIds.has(ch.id));

                if (newChapters.length > 0) {
                  existingComic.chapters.push(...newChapters);
                  existingComic.chapters.sort((a, b) => a.id - b.id);
                  updatedManga++;
                }
              } else {
                data.comics.push({
                  id,
                  title: m.attributes.title?.vi || m.attributes.title?.en || 'Unknown',
                  desc: m.attributes.description?.vi || m.attributes.description?.en || '',
                  cover: coverUrl,
                  chapters: chapters
                });
                addedManga++;
              }
            }

            await fs.writeFile('data.json', JSON.stringify(data, null, 2));
            console.log(`🎉 Added: ${addedManga}, Updated: ${updatedManga}`);
          }

          main().catch(console.error);
          EOF

          npm install axios
          node sync.js

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          if git diff --quiet --staged; then
            echo "No changes"
          else
            git commit -m "🤖 Sync full manga data from MangaDex"
            git push "https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git"
          fi
