name: Sync Full GenderSwap VN Manga

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch & Sync Manga + Chapters
        run: |
          cat > sync.js << 'EOF'
          const fs = require('fs').promises;
          const axios = require('axios');

          const TAG_ID = '2bd2e8d0-f146-434a-9b51-fc9ff2c5fe6a';

          async function hasVietnameseChapters(mangaId) {
            try {
              const res = await axios.get('https://api.mangadex.org/chapter', {
                params: {
                  manga: mangaId,
                  translatedLanguage: ['vi'],
                  limit: 1
                },
                headers: { 'User-Agent': 'GenBen-Updater/1.0' }
              });
              return res.data.data.length > 0;
            } catch (e) {
              return false;
            }
          }

          async function fetchChapters(mangaId) {            try {
              const res = await axios.get('https://api.mangadex.org/manga/' + mangaId + '/feed', {
                params: {
                  translatedLanguage: ['vi'],
                  limit: 500,
                  order: { chapter: 'asc' }
                },
                headers: { 'User-Agent': 'GenBen-Updater/1.0' }
              });

              const chapters = [];
              for (let i = 0; i < res.data.data.length; i++) {
                const ch = res.data.data[i];

                // ✅ FIX: Dùng index + 1 làm ID duy nhất, không phụ thuộc vào số chapter từ MangaDex
                const uniqueId = i + 1;

                const imagesRes = await axios.get(`https://api.mangadex.org/at-home/server/${ch.id}`, {
                  headers: { 'User-Agent': 'GenBen-Updater/1.0' }
                });

                const images = imagesRes.data.chapter.data.map(
                  img => imagesRes.data.baseUrl + '/data/' + imagesRes.data.chapter.hash + '/' + img
                );

                chapters.push({
                  id: uniqueId,  // ✅ ĐẢM BẢO DUY NHẤT
                  name: `Chapter ${ch.attributes.chapter || uniqueId}: ${ch.attributes.title || ''}`,
                  pages: images
                });
              }
              return chapters;
            } catch (e) {
              return [];
            }
          }

          async function main() {
            console.log('🚀 Starting sync...');

            const res = await axios.get('https://api.mangadex.org/manga', {
              params: {
                includedTags: [TAG_ID],
                limit: 100,
                includes: ['cover_art'],
                order: { latestUploadedChapter: 'desc' }
              },
              headers: { 'User-Agent': 'GenBen-Updater/1.0' }
            });
            if (res.data.data.length === 0) {
              console.log('ℹ️ No manga found with tag "Gender Swap".');
              return;
            }

            console.log(`✅ Found ${res.data.data.length} manga with tag "Gender Swap".`);

            let data;
            try {
              data = JSON.parse(await fs.readFile('data.json', 'utf8'));
            } catch {
              data = { comics: [] };
            }

            const existingMap = new Map(data.comics.map(c => [c.id, c]));
            let addedManga = 0;
            let updatedManga = 0;

            for (const m of res.data.data) {
              console.log(`\n📖 Checking: ${m.attributes.title?.en || 'Unknown'}`);

              if (!(await hasVietnameseChapters(m.id))) {
                console.log(`❌ No Vietnamese chapters for ${m.attributes.title?.en || m.id}`);
                continue;
              }

              console.log(`✅ Has Vietnamese chapters, fetching details...`);

              const id = 'md_' + m.id;
              const cover = m.relationships.find(r => r.type === 'cover_art');
              const coverUrl = cover 
                ? `https://uploads.mangadex.org/covers/${m.id}/${cover.attributes.fileName}.256.jpg`
                : 'https://placehold.co/300x400/444/ccc?text=No+Image';

              const chapters = await fetchChapters(m.id);

              if (existingMap.has(id)) {
                const existingComic = existingMap.get(id);
                const existingChapterIds = new Set(existingComic.chapters.map(c => c.id));

                const newChapters = chapters.filter(ch => !existingChapterIds.has(ch.id));
                if (newChapters.length > 0) {
                  existingComic.chapters.push(...newChapters);
                  existingComic.chapters.sort((a, b) => a.id - b.id);
                  updatedManga++;
                  console.log(`🔄 Updated ${existingComic.title} with ${newChapters.length} new chapters`);
                }
              } else {
                data.comics.push({
                  id,                  title: m.attributes.title?.vi || m.attributes.title?.en || 'Unknown',
                  desc: m.attributes.description?.vi || m.attributes.description?.en || '',
                  cover: coverUrl,
                  chapters: chapters
                });
                addedManga++;
                console.log(`✅ Added new manga: ${m.attributes.title?.vi || m.attributes.title?.en}`);
              }
            }

            if (addedManga > 0 || updatedManga > 0) {
              await fs.writeFile('data.json', JSON.stringify(data, null, 2));
              console.log(`\n🎉 Summary: Added ${addedManga}, Updated ${updatedManga}`);
            } else {
              console.log('\nℹ️ No changes to write.');
            }
          }

          main().catch(console.error);
          EOF

          npm install axios
          node sync.js

      - name: Commit & Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Sync full manga data from MangaDex"
            git push "https://$GH_TOKEN@github.com/${{ github.repository }}.git"
          fi
