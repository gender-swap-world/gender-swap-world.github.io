<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chi tiết truyện</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #2c2c2c;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .comic-title {
            font-size: 1.8rem;
            color: #ffcc00;
            margin-bottom: 20px;
            text-align: center;
        }
        .comic-cover {
            width: 100%;
            max-width: 250px;
            height: auto;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            display: block;
            margin: 0 auto 20px;
        }
        .comic-desc {
            padding: 15px;
            background: #3a3a3a;
            border-radius: 8px;
            margin-bottom: 20px;
            line-height: 1.6;
            color: #ccc;
            white-space: pre-wrap;
        }
        .chapter-list {
            margin-top: 20px;
        }
        .chapter-list h2 {
            color: #ffcc00;
            margin-bottom: 12px;
        }        .chapter-item {
            padding: 12px;
            background: #3a3a3a;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .chapter-item:hover {
            background: #4a4a4a;
        }
        .back-btn {
            padding: 10px 16px;
            background: #555;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
        }
        .back-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <a href="./" class="back-btn">← Về trang chủ</a>

        <h1 id="title" class="comic-title"></h1>

        <img id="cover" class="comic-cover" src="" alt="Ảnh bìa" />

        <div id="desc" class="comic-desc"></div>

        <div class="chapter-list">
            <h2>Danh sách chapter</h2>
            <div id="chapters-container"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const comicId = urlParams.get('id');

        async function fetchData() {
            const response = await fetch('./data.json');
            const data = await response.json();
            return data.comics;
        }
        function findComic() {
            return window.allComics.find(c => c.id === comicId);
        }

        function renderComic(comic) {
            document.getElementById('title').textContent = comic.title;
            document.getElementById('cover').src = comic.cover;
            document.getElementById('desc').textContent = comic.desc;

            const container = document.getElementById('chapters-container');
            container.innerHTML = '';

            comic.chapters.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'chapter-item';
                div.textContent = ch.name;
                div.onclick = () => {
                    window.location.href = `reader.html?comic=${comic.id}&chapter=${ch.id}`;
                };
                container.appendChild(div);
            });
        }

        async function init() {
            const comics = await fetchData();
            window.allComics = comics;

            const comic = findComic();
            if (!comic) {
                document.body.innerHTML = '<div style="text-align: center; color: #aaa; font-size: 1.2rem; margin: 50px 0;">Truyện không tồn tại</div>';
                return;
            }

            renderComic(comic);
        }

        init();
    </script>
</body>
</html>
