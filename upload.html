<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Upload Truyện | Thế Giới GenBen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffcc00;
            margin-bottom: 24px;
            font-weight: bold;
        }
        .card {
            background: #2c2c2c;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #444;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #ccc;
        }
        input, textarea {
            width: 100%;
            padding: 10px 12px;
            background: #3a3a3a;
            border: 1px solid #555;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 1rem;
        }
        textarea {
            min-height: 80px;
            resize: vertical;
        }        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .tab-btn {
            flex: 1;
            padding: 8px;
            background: #444;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #aaa;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #ffcc00;
            color: #2c2c2c;
            font-weight: bold;
        }
        .tab-btn:hover:not(.active) { background: #555; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .chapter-item {
            background: #3a3a3a;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            border: 1px solid #555;
        }
        .chapter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .chapter-title {
            font-weight: 500;
            color: #ffcc00;
        }
        .btn {
            padding: 8px 16px;
            background: #ffcc00;
            color: #2c2c2c;
            border: none;
            border-radius: 6px;            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline {
            background: transparent;
            border: 1px solid #555;
            color: #e0e0e0;
        }
        .btn-outline:hover { background: #555; }
        .btn-danger { background: #f55; color: #fff; }
        
        #progress, #output {
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.9rem;
        }
        #progress {
            background: #3a3a3a;
            color: #ffcc00;
            display: none;
            border-left: 4px solid #ffcc00;
        }
        #output {
            background: #2c2c2c;
            color: #0f0;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            border-left: 4px solid #5f5;
        }
        .error { color: #f55 !important; border-left-color: #f55 !important; }
        .success { color: #5f5 !important; border-left-color: #5f5 !important; }
        .info { color: #8af !important; border-left-color: #8af !important; }
        .file-info {
            font-size: 0.85rem;
            color: #888;
            margin-top: 4px;
        }
        .mode-indicator {
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 8px;        }
        .mode-upload { background: #ffcc00; color: #222; }
        .mode-url { background: #5f5; color: #222; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 Upload Truyện Mới / Cập nhật Chapter</h1>

        <div class="card">
            <label for="token">Nhập Mã Upload (mật khẩu)<span style="color:#f55">*</span></label>
            <input type="password" id="token" required placeholder="mã upload" />
            <div class="file-info">cần mã upload để có quyền đăng truyện</div>
        </div>

        <div class="card">
            <label>ID truyện (bắt buộc) <span style="color:#f55">*</span></label>
            <input type="text" id="comic-id" required placeholder="id truyện dùng để cập nhật chapter mới nếu đã có truyện" />
            <div class="file-info">ID không dấu, viết thường, cách nhau bằng dấu gạch dưới</div>

            <label>Tên truyện <span style="color:#f55">*</span></label>
            <input type="text" id="title" required placeholder="Nhập tên truyện..." />

            <label>Mô tả</label>
            <textarea id="description" placeholder="Mô tả ngắn về truyện..."></textarea>

            <label>Ảnh bìa</label>
            <div class="tabs">
                <button class="tab-btn active" data-tab="cover" data-mode="upload">📁 nhập file</button>
                <button class="tab-btn" data-tab="cover" data-mode="url">🔗 Nhập URL</button>
            </div>
            <div id="cover-upload" class="tab-content active">
                <input type="file" id="cover-upload-input" accept="image/*" />
                <div class="file-info" id="cover-file-info"></div>
            </div>
            <div id="cover-url" class="tab-content">
                <textarea id="cover-url-input" placeholder="Dán URL ảnh bìa (mỗi dòng 1 URL)"></textarea>
                <div class="file-info">Chỉ sử dụng URL ảnh trực tiếp (.jpg, .png, .webp...)</div>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; flex-wrap:wrap; gap:8px;">
                <label>Chương truyện</label>
                <button class="btn" id="add-chapter">+ Thêm chương</button>
            </div>
            <div class="file-info">Nhập ít nhất 1 chương. Chọn chế độ "nhập file" hoặc "Nhập URL" cho từng chapter.</div>

            <div id="chapters-container"></div>
        </div>
        <div class="card">
            <button class="btn" id="submit-btn" style="width:100%; padding:12px; font-size:1.1rem;">📤 Upload Truyện</button>
        </div>

        <div id="progress"></div>
        <div id="output"></div>
    </div>

    <script>
        const REPO_NAME = "gender-swap-world/gender-swap-world.github.io";
        const REPO_BRANCH = "main";

        // ========== UTF-8 Base64 Helpers ==========
        function utf8ToBase64(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (_, p1) => String.fromCharCode('0x' + p1)));
        }
        function base64ToUtf8(base64) {
            return decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        }

        // ========== UI Helpers ==========
        function showProgress(text) {
            const el = document.getElementById('progress');
            el.textContent = text;
            el.style.display = 'block';
            el.className = '';
        }
        function showOutput(text, type = 'info') {
            const el = document.getElementById('output');
            el.textContent = text;
            el.className = type;
            el.style.display = 'block';
            document.getElementById('progress').style.display = 'none';
            console.log(`[${type.toUpperCase()}] ${text}`);
        }

        // ========== Tab Switching (Generic) ==========
        function initTabs(container = document) {
            container.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabGroup = btn.dataset.tab;
                    const mode = btn.dataset.mode;
                    
                    // Deactivate all buttons in this group
                    container.querySelectorAll(`.tab-btn[data-tab="${tabGroup}"]`).forEach(b => b.classList.remove('active'));
                    // Hide all contents in this group
                    container.querySelectorAll(`[id^="${tabGroup}-"]`).forEach(c => {
                        if (c.classList.contains('tab-content')) c.classList.remove('active');
                    });                    
                    // Activate selected
                    btn.classList.add('active');
                    document.getElementById(`${tabGroup}-${mode}`).classList.add('active');
                    
                    // Update visual indicator if exists
                    const indicator = btn.closest('.chapter-item')?.querySelector('.mode-indicator');
                    if (indicator) {
                        indicator.textContent = mode === 'upload' ? '📁 File Mode' : '🔗 URL Mode';
                        indicator.className = `mode-indicator mode-${mode}`;
                    }
                });
            });
        }

        // Init global tabs (cover)
        initTabs(document);

        // Cover file info display
        document.getElementById('cover-upload-input').addEventListener('change', function() {
            const info = document.getElementById('cover-file-info');
            if (this.files[0]) {
                info.textContent = `📄 ${this.files[0].name} (${(this.files[0].size/1024).toFixed(1)} KB)`;
            } else {
                info.textContent = '';
            }
        });

        // ========== Chapter Management ==========
        let chapterCounter = 1;

        function createChapterElement(index) {
            const chapterId = `chapter-${index}`;
            const div = document.createElement('div');
            div.className = 'chapter-item';
            div.dataset.chapterId = chapterId;
            div.innerHTML = `
                <div class="chapter-header">
                    <div>
                        <span class="chapter-title">Chapter <span class="chapter-num">${index}</span></span>
                        <span class="mode-indicator mode-upload">📁 File Mode</span>
                    </div>
                    <button class="btn btn-outline btn-danger remove-chapter">🗑️ Xóa</button>
                </div>
                
                <input type="text" class="chapter-name" placeholder="Tên chương" required />
                
                <div class="tabs">
                    <button class="tab-btn active" data-tab="pages-${chapterId}" data-mode="upload">📁 nhập file ảnh</button>
                    <button class="tab-btn" data-tab="pages-${chapterId}" data-mode="url">🔗 Nhập URL ảnh</button>                </div>
                
                <!-- FILE UPLOAD MODE -->
                <div id="pages-${chapterId}-upload" class="tab-content active">
                    <input type="file" class="chapter-pages-upload" accept="image/*" multiple />
                    <div class="file-info chapter-file-info" id="file-info-${chapterId}"></div>
                    <div class="file-info" style="color:#8af">ảnh sẽ được đăng lên host trung gian rồi mới đăng lên web</div>
                </div>
                
                <!-- URL MODE -->
                <div id="pages-${chapterId}-url" class="tab-content">
                    <textarea class="chapter-pages-url" placeholder="Dán URL ảnh trực tiếp (mỗi dòng 1 URL)&#10;VD:&#10;https://img.example.com/ch1/01.jpg&#10;https://cdn.example.com/img2.png"></textarea>
                    <div class="file-info" style="color:#5f5">✓ URL sẽ được cho trực tiếp lên web mà ko cần upload trung gian</div>
                </div>
            `;
            return div;
        }

        document.getElementById('add-chapter').addEventListener('click', () => {
            const container = document.getElementById('chapters-container');
            const chapterEl = createChapterElement(chapterCounter);
            container.appendChild(chapterEl);
            
            // Init tab switching for this chapter
            initTabs(chapterEl);
            
            // File info display for upload mode
            const fileInput = chapterEl.querySelector('.chapter-pages-upload');
            const fileInfo = chapterEl.querySelector('.chapter-file-info');
            fileInput.addEventListener('change', function() {
                if (this.files.length > 0) {
                    const totalSize = Array.from(this.files).reduce((acc, f) => acc + f.size, 0);
                    fileInfo.textContent = `📁 ${this.files.length} ảnh • ${(totalSize/1024).toFixed(1)} KB`;
                } else {
                    fileInfo.textContent = '';
                }
            });
            
            // Remove button
            chapterEl.querySelector('.remove-chapter').addEventListener('click', () => {
                if (confirm('Xóa chapter này?')) {
                    chapterEl.remove();
                    renumberChapters();
                }
            });
            
            chapterCounter++;
            renumberChapters();
        });
        function renumberChapters() {
            document.querySelectorAll('.chapter-item').forEach((item, idx) => {
                item.querySelector('.chapter-num').textContent = idx + 1;
                item.dataset.chapterId = `chapter-${idx + 1}`;
            });
        }

        // ========== GitHub File Upload ==========
        async function uploadFileToGitHub(token, path, file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async () => {
                    try {
                        const base64Content = reader.result.split(',')[1];
                        const apiUrl = `https://api.github.com/repos/${REPO_NAME}/contents/${path}`;
                        
                        const response = await fetch(apiUrl, {
                            method: 'PUT',
                            headers: {
                                'Authorization': `Bearer ${token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                message: `Upload: ${path}`,
                                content: base64Content,
                                branch: REPO_BRANCH
                            })
                        });
                        
                        if (!response.ok) {
                            const errText = await response.text();
                            throw new Error(`GitHub API (${response.status}): ${errText}`);
                        }
                        
                        const data = await response.json();
                        resolve(`https://raw.githubusercontent.com/${REPO_NAME}/${REPO_BRANCH}/${path}`);
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.onerror = () => reject(new Error('Failed to read file'));
                reader.readAsDataURL(file);
            });
        }

        // ========== Get Active Mode for a Chapter ==========
        function getChapterMode(chapterEl) {
            const uploadBtn = chapterEl.querySelector('.tab-btn[data-mode="upload"]');
            return uploadBtn?.classList.contains('active') ? 'upload' : 'url';
        }
        // ========== Main Submit ==========
        document.getElementById('submit-btn').addEventListener('click', async () => {
            const token = document.getElementById('token').value.trim();
            const comicId = document.getElementById('comic-id').value.trim();
            const title = document.getElementById('title').value.trim();
            const desc = document.getElementById('description').value.trim();

            // Validation
            if (!token) { showOutput('❌ Vui lòng nhập mã upload', 'error'); return; }
            if (!comicId) { showOutput('❌ Vui lòng nhập ID truyện', 'error'); return; }
            if (!title) { showOutput('❌ Vui lòng nhập tên truyện', 'error'); return; }

            const chapterItems = document.querySelectorAll('.chapter-item');
            if (chapterItems.length === 0) {
                showOutput('❌ Vui lòng thêm ít nhất 1 chapter', 'error');
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            document.getElementById('output').style.display = 'none';

            try {
                showProgress('⏳ Đang tải dữ liệu hiện tại...');
                
                // Fetch data.json
                const apiUrl = `https://api.github.com/repos/${REPO_NAME}/contents/data.json?ref=${REPO_BRANCH}`;
                const res = await fetch(apiUrl, { headers: { 'Authorization': `Bearer ${token}` }});
                
                if (!res.ok) {
                    if (res.status === 404) {
                        throw new Error('File dữ liệu không tồn tại: {"comics":[]}');
                    }
                    throw new Error(`Không thể tải dữ liệu: ${res.status}`);
                }
                
                const fileInfo = await res.json();
                const existingData = JSON.parse(base64ToUtf8(fileInfo.content));
                if (!existingData.comics || !Array.isArray(existingData.comics)) {
                    existingData.comics = [];
                }

                // Process chapters
                showProgress('📋 Đang xử lý chapters...');
                const newChapters = [];
                
                // Calculate next chapter ID
                const existingComic = existingData.comics.find(c => c.id === comicId);
                let nextChapterId = 1;                if (existingComic?.chapters?.length > 0) {
                    nextChapterId = Math.max(...existingComic.chapters.map(c => c.id || 0)) + 1;
                }

                for (let i = 0; i < chapterItems.length; i++) {
                    const item = chapterItems[i];
                    const chapterName = item.querySelector('.chapter-name')?.value.trim();
                    if (!chapterName) {
                        showOutput(`❌ Chapter ${i+1}: Vui lòng nhập tên chapter`, 'error');
                        submitBtn.disabled = false;
                        return;
                    }

                    const mode = getChapterMode(item);
                    let pages = [];

                    if (mode === 'upload') {
                        // 📁 FILE UPLOAD MODE: Upload to GitHub first
                        const fileInput = item.querySelector('.chapter-pages-upload');
                        const files = fileInput?.files || [];
                        
                        if (files.length === 0) {
                            showOutput(`❌ Chapter "${chapterName}": Vui lòng chọn ít nhất 1 ảnh ở chế độ "Tải file"`, 'error');
                            submitBtn.disabled = false;
                            return;
                        }
                        
                        showProgress(`🖼️ Uploading ${files.length} ảnh cho "${chapterName}"...`);
                        
                        for (let j = 0; j < files.length; j++) {
                            const file = files[j];
                            const safeName = file.name.replace(/[^a-z0-9._-]/gi, '_');
                            const path = `pages/${comicId}/ch${nextChapterId + i}/${Date.now()}_${j}_${safeName}`;
                            
                            try {
                                const url = await uploadFileToGitHub(token, path, file);
                                pages.push(url);
                                showProgress(`✓ Trang ${j+1}/${files.length}`);
                            } catch (err) {
                                throw new Error(`Upload ảnh thất bại: ${err.message}`);
                            }
                        }
                        
                    } else {
                        // 🔗 URL MODE: Use URLs directly, NO upload to GitHub
                        const urlTextarea = item.querySelector('.chapter-pages-url');
                        const urlsText = urlTextarea?.value.trim() || '';
                        
                        if (!urlsText) {
                            showOutput(`❌ Chapter "${chapterName}": Vui lòng nhập ít nhất 1 URL ảnh ở chế độ "Nhập URL"`, 'error');                            submitBtn.disabled = false;
                            return;
                        }
                        
                        // Parse and validate URLs
                        pages = urlsText
                            .split('\n')
                            .map(u => u.trim())
                            .filter(u => u && u.startsWith('http'));
                        
                        if (pages.length === 0) {
                            showOutput(`❌ Chapter "${chapterName}": Không tìm thấy URL hợp lệ (phải bắt đầu bằng http/https)`, 'error');
                            submitBtn.disabled = false;
                            return;
                        }
                        
                        showProgress(`✓ Chapter "${chapterName}": Đã lấy ${pages.length} URL (không upload)`);
                    }

                    newChapters.push({
                        id: nextChapterId + i,
                        name: chapterName,
                        pages: pages,
                        uploadedAt: new Date().toISOString()
                    });
                }

                if (newChapters.length === 0) {
                    showOutput('❌ Không có chapter hợp lệ để xử lý', 'error');
                    submitBtn.disabled = false;
                    return;
                }

                // Update or create comic in data.json
                if (existingComic) {
                    showProgress('🔄 Đang cập nhật chapter vào truyện...');
                    existingComic.chapters.push(...newChapters);
                    existingComic.chapters.sort((a, b) => (a.id || 0) - (b.id || 0));
                    existingComic.updatedAt = new Date().toISOString();
                } else {
                    showProgress('📦 Đang tạo truyện mới...');
                    
                    // Handle cover
                    let coverUrl = '';
                    const coverMode = document.querySelector('.tab-btn[data-tab="cover"][data-mode="upload"]')?.classList.contains('active') ? 'upload' : 'url';
                    
                    if (coverMode === 'upload') {
                        const coverFile = document.getElementById('cover-upload-input').files[0];
                        if (!coverFile) throw new Error('Vui lòng chọn ảnh bìa');
                        showProgress('🖼️ Đang upload ảnh bìa...');                        const safeName = coverFile.name.replace(/[^a-z0-9._-]/gi, '_');
                        const path = `covers/${comicId}/${Date.now()}_${safeName}`;
                        coverUrl = await uploadFileToGitHub(token, path, coverFile);
                    } else {
                        const coverUrls = document.getElementById('cover-url-input').value.trim();
                        if (!coverUrls) throw new Error('Vui lòng nhập URL ảnh bìa');
                        coverUrl = coverUrls.split('\n').map(u => u.trim()).find(u => u.startsWith('http'));
                        if (!coverUrl) throw new Error('URL ảnh bìa không hợp lệ');
                        // Cover URL is used directly, no upload
                    }
                    
                    const newComic = {
                        id: comicId,
                        title: title,
                        desc: desc || '',
                        cover: coverUrl,
                        chapters: newChapters,
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString(),
                        status: 'ongoing'
                    };
                    existingData.comics.push(newComic);
                }

                // Save data.json with UTF-8 encoding
                showProgress('💾 Đang lưu vào dữ liệu...');
                const jsonString = JSON.stringify(existingData, null, 2);
                const encodedContent = utf8ToBase64(jsonString);
                
                const saveRes = await fetch(`https://api.github.com/repos/${REPO_NAME}/contents/data.json`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: existingComic 
                            ? `✨ Update: +${newChapters.length} chapters to "${title}"`
                            : `🆕 Add new comic: "${title}"`,
                        content: encodedContent,
                        sha: fileInfo.sha,
                        branch: REPO_BRANCH
                    })
                });
                
                if (!saveRes.ok) {
                    const errText = await saveRes.text();
                    throw new Error(`Không thể lưu data.json: ${saveRes.status} - ${errText}`);
                }
                // Success
                const totalChapters = existingComic ? existingComic.chapters.length : newChapters.length;
                const successMsg = existingComic
                    ? `✅ Cập nhật thành công!\n📚 Truyện: "${existingComic.title}"\n📥 Đã thêm: ${newChapters.length} chapter\n📊 Tổng chapter: ${totalChapters}\n\n🔗 Chapters:\n${newChapters.map(c => `• ${c.name} (ID: ${c.id}) - ${c.pages.length} trang`).join('\n')}`
                    : `✅ Thêm truyện mới thành công!\n📚 Tên: "${title}"\n🆔 ID: ${comicId}\n📥 Số chapter: ${newChapters.length}\n📊 Tổng truyện: ${existingData.comics.length}`;
                
                showOutput(successMsg, 'success');
                
            } catch (err) {
                console.error('Upload error:', err);
                showOutput(`❌ Lỗi: ${err.message}\n\n💡 Kiểm tra:\n•mã upload hợp lệ\n• ID truyện không chứa ký tự đặc biệt\n• URL ảnh hợp lệ (http/https)\n• File dữ liệu tồn tại?`, 'error');
            } finally {
                submitBtn.disabled = false;
            }
        });

        // Auto-add first chapter on load
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('add-chapter').click();
        });
    </script>
</body>
</html>
