<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Upload Truyện | Thế Giới GenBen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffcc00;
            margin-bottom: 24px;
            font-weight: bold;
        }
        .card {
            background: #2c2c2c;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #444;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #ccc;
        }
        input, textarea {
            width: 100%;
            padding: 10px 12px;
            background: #3a3a3a;
            border: 1px solid #555;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 1rem;
        }
        textarea {            min-height: 80px;
            resize: vertical;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .tab-btn {
            flex: 1;
            padding: 8px;
            background: #444;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #aaa;
        }
        .tab-btn.active {
            background: #ffcc00;
            color: #2c2c2c;
            font-weight: bold;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .chapter-list {
            margin-top: 16px;
        }
        .chapter-item {
            background: #3a3a3a;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chapter-title {
            font-weight: 500;
        }
        .btn {
            padding: 8px 16px;
            background: #ffcc00;
            color: #2c2c2c;
            border: none;
            border-radius: 6px;            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn:hover { opacity: 0.9; }
        .btn-outline {
            background: transparent;
            border: 1px solid #555;
            color: #e0e0e0;
        }
        #progress, #output {
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
        }
        #progress {
            background: #3a3a3a;
            color: #ffcc00;
            display: none;
        }
        #output {
            background: #2c2c2c;
            color: #0f0;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        .error {
            color: #f55;
        }
        .success {
            color: #5f5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 Upload Truyện Mới</h1>

        <div class="card">
            <label for="token">GitHub Token (PAT)</label>
            <input type="password" id="token" required />
        </div>

        <div class="card">
            <label>Tên truyện</label>
            <input type="text" id="title" required />
            <label>Mô tả</label>
            <textarea id="description"></textarea>

            <label>Ảnh bìa</label>
            <div class="tabs">
                <button class="tab-btn active" data-tab="upload-cover">📁 Tải file</button>
                <button class="tab-btn" data-tab="url-cover">🔗 Nhập URL</button>
            </div>
            <div id="upload-cover" class="tab-content active">
                <input type="file" id="cover-upload" accept="image/*" />
            </div>
            <div id="url-cover" class="tab-content">
                <textarea id="cover-url" placeholder="Dán URL ảnh bìa, mỗi dòng 1 ảnh"></textarea>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label>Chương truyện</label>
                <button class="btn" id="add-chapter">+ Thêm chương</button>
            </div>

            <div id="chapters-container">
                <div class="chapter-item">
                    <div>
                        <div class="chapter-title">Chapter 1</div>
                        <input type="text" class="chapter-name" placeholder="Tên chương..." />
                    </div>
                    <button class="btn btn-outline remove-chapter">🗑️</button>
                </div>
                <div class="form-group">
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="upload-pages-0">📁 Tải file</button>
                        <button class="tab-btn" data-tab="url-pages-0">🔗 Nhập URL</button>
                    </div>
                    <div id="upload-pages-0" class="tab-content active">
                        <input type="file" multiple class="chapter-pages-upload" accept="image/*" />
                    </div>
                    <div id="url-pages-0" class="tab-content">
                        <textarea class="chapter-pages-url" placeholder="Dán URL ảnh, mỗi dòng 1 ảnh"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <button class="btn" id="submit-btn">📤 Upload Truyện & Ảnh Lên GitHub</button>
        </div>

        <div id="progress"></div>        <div id="output"></div>
    </div>

    <script>
        const REPO_NAME = "gender-swap-world/gender-swap-world.github.io";

        // Tab switch
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabType = btn.getAttribute('data-tab');
                const group = tabType.split('-')[0];
                btn.parentElement.querySelectorAll(`.tab-btn[data-tab^="${group}"]`).forEach(b => b.classList.remove('active'));
                btn.parentElement.parentElement.querySelectorAll(`.${group}-content`).forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(tabType).classList.add('active');
            });
        });

        // Add chapter
        let chapterIndex = 1;
        document.getElementById('add-chapter').addEventListener('click', () => {
            chapterIndex++;
            const container = document.getElementById('chapters-container');

            const chapterItem = document.createElement('div');
            chapterItem.className = 'chapter-item';
            chapterItem.innerHTML = `
                <div>
                    <div class="chapter-title">Chapter ${chapterIndex}</div>
                    <input type="text" class="chapter-name" placeholder="Tên chương..." />
                </div>
                <button class="btn btn-outline remove-chapter">🗑️</button>
            `;
            container.appendChild(chapterItem);

            const pagesContainer = document.createElement('div');
            pagesContainer.className = 'form-group';
            pagesContainer.innerHTML = `
                <div class="tabs">
                    <button class="tab-btn active" data-tab="upload-pages-${chapterIndex}">📁 Tải file</button>
                    <button class="tab-btn" data-tab="url-pages-${chapterIndex}">🔗 Nhập URL</button>
                </div>
                <div id="upload-pages-${chapterIndex}" class="tab-content active">
                    <input type="file" multiple class="chapter-pages-upload" accept="image/*" />
                </div>
                <div id="url-pages-${chapterIndex}" class="tab-content">
                    <textarea class="chapter-pages-url" placeholder="Dán URL ảnh, mỗi dòng 1 ảnh"></textarea>
                </div>
            `;
            container.appendChild(pagesContainer);
            // Setup tab
            pagesContainer.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabType = btn.getAttribute('data-tab');
                    btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.parentElement.parentElement.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(tabType).classList.add('active');
                });
            });

            // Remove chapter
            chapterItem.querySelector('.remove-chapter').addEventListener('click', () => {
                chapterItem.remove();
                pagesContainer.remove();
            });
        });

        // Submit
        document.getElementById('submit-btn').addEventListener('click', async () => {
            const token = document.getElementById('token').value.trim();
            const title = document.getElementById('title').value.trim();
            const desc = document.getElementById('description').value.trim();

            if (!token) {
                showOutput('❌ Vui lòng nhập GitHub Token', 'error');
                return;
            }
            if (!title) {
                showOutput('❌ Vui lòng nhập tên truyện', 'error');
                return;
            }

            const progress = document.getElementById('progress');
            const output = document.getElementById('output');
            progress.style.display = 'block';
            progress.textContent = '⏳ Đang tải dữ liệu hiện tại...';
            output.style.display = 'none';

            try {
                // Fetch current data.json
                const res = await fetch(`https://api.github.com/repos/${REPO_NAME}/contents/data.json`);
                const json = await res.json();
                const existing = JSON.parse(atob(json.content));

                // Xử lý ảnh bìa
                let coverUrl = '';
                if (document.getElementById('upload-cover').classList.contains('active')) {
                    const file = document.getElementById('cover-upload').files[0];                    if (file) {
                        progress.textContent = '📷 Đang upload ảnh bìa...';
                        coverUrl = await uploadFile(token, `covers/${Date.now()}_${file.name}`, file);
                    } else {
                        throw new Error('Vui lòng chọn ảnh bìa');
                    }
                } else {
                    const coverText = document.getElementById('cover-url').value.trim();
                    if (!coverText) throw new Error('Vui lòng nhập URL ảnh bìa');
                    coverUrl = coverText.split('\n')[0].trim(); // Lấy ảnh đầu tiên
                }

                // Xử lý các chương
                const chapters = [];
                const chapterItems = document.querySelectorAll('.chapter-item');
                for (let i = 0; i < chapterItems.length; i++) {
                    const name = chapterItems[i].querySelector('.chapter-name').value.trim();
                    if (!name) continue;

                    let pages = [];

                    const uploadTab = document.getElementById(`upload-pages-${i + 1}`);
                    const urlTab = document.getElementById(`url-pages-${i + 1}`);

                    if (uploadTab && uploadTab.classList.contains('active')) {
                        const files = chapterItems[i].closest('.chapter-item').nextElementSibling.querySelectorAll('.chapter-pages-upload')[0]?.files || [];
                        for (let j = 0; j < files.length; j++) {
                            progress.textContent = `🖼️ Up ảnh Chapter ${i + 1}, trang ${j + 1}...`;
                            const url = await uploadFile(token, `pages/${Date.now()}_${i + 1}_${j + 1}_${files[j].name}`, files[j]);
                            pages.push(url);
                        }
                    } else if (urlTab && urlTab.classList.contains('active')) {
                        const urls = document.getElementById(`url-pages-${i + 1}`).querySelector('textarea').value.trim();
                        if (urls) {
                            pages = urls.split('\n').map(u => u.trim()).filter(Boolean); // ✅ Dùng trực tiếp URL
                        }
                    }

                    chapters.push({
                        id: i + 1,
                        name: name,
                        pages: pages
                    });
                }

                // Tạo truyện mới
                const newComic = {
                    id: title.toLowerCase().replace(/\s+/g, '_') + '-' + Date.now(),
                    title: title,
                    desc: desc,                    cover: coverUrl,
                    chapters: chapters
                };

                existing.comics.push(newComic);

                // ✅ Encode JSON đúng Unicode
                const jsonString = JSON.stringify(existing, null, 2);
                const encodedContent = btoa(unescape(encodeURIComponent(jsonString)));

                // Cập nhật data.json
                progress.textContent = '💾 Đang cập nhật data.json...';
                await fetch(`https://api.github.com/repos/${REPO_NAME}/contents/data.json`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Add comic: ${title}`,
                        content: encodedContent,
                        sha: json.sha
                    })
                });

                showOutput(`✅ Thành công! Đã thêm "${title}" vào data.json.\n→ Tổng số truyện: ${existing.comics.length}`, 'success');
            } catch (err) {
                showOutput(`❌ Lỗi: ${err.message}`, 'error');
            }
        });

        async function uploadFile(token, path, file) {
            const reader = new FileReader();
            return new Promise((resolve, reject) => {
                reader.onload = async () => {
                    const base64 = reader.result.split(',')[1];
                    try {
                        const res = await fetch(`https://api.github.com/repos/${REPO_NAME}/contents/${path}`, {
                            method: 'PUT',
                            headers: {
                                'Authorization': `Bearer ${token}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                message: `Upload ${path}`,
                                content: base64
                            })
                        });
                        if (!res.ok) throw new Error(await res.text());
                        const data = await res.json();                        resolve(`https://raw.githubusercontent.com/${REPO_NAME}/main/${path}`);
                    } catch (e) {
                        reject(e);
                    }
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function showOutput(text, type) {
            const output = document.getElementById('output');
            output.className = type;
            output.textContent = text;
            output.style.display = 'block';
            document.getElementById('progress').style.display = 'none';
        }
    </script>
</body>
</html>
