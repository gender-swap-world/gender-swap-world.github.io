<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đọc truyện</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .page-img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .nav {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }
        .btn {
            padding: 10px 20px;
            background: #ffcc00;
            color: #2c2c2c;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading { text-align: center; color: #aaa; font-size: 1.2rem; margin: 50px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div id="pages-container"></div>

        <div class="nav">
            <button class="btn" id="prev-btn">← Trang trước</button>            <span id="page-info">Trang 1/1</span>
            <button class="btn" id="next-btn">Trang sau →</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const comicId = urlParams.get('comic');
        const chapterId = parseInt(urlParams.get('chapter'));

        let currentComic = null;
        let currentChapter = null;
        let currentPageIndex = 0;

        async function fetchData() {
            const response = await fetch('./data.json');
            const data = await response.json();
            return data.comics;
        }

        function findComicAndChapter() {
            const comics = window.allComics;
            currentComic = comics.find(c => c.id === comicId);
            if (currentComic) {
                currentChapter = currentComic.chapters.find(ch => ch.id === chapterId);
            }
        }

        function renderPage() {
            const container = document.getElementById('pages-container');
            const page = currentChapter.pages[currentPageIndex];

            container.innerHTML = `<img src="${page}" class="page-img" />`;

            document.getElementById('page-info').textContent = `Trang ${currentPageIndex + 1}/${currentChapter.pages.length}`;

            document.getElementById('prev-btn').disabled = currentPageIndex === 0;
            document.getElementById('next-btn').disabled = currentPageIndex === currentChapter.pages.length - 1;
        }

        document.getElementById('prev-btn').addEventListener('click', () => {
            if (currentPageIndex > 0) {
                currentPageIndex--;
                renderPage();
                window.scrollTo(0, 0);
            }
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            if (currentPageIndex < currentChapter.pages.length - 1) {                currentPageIndex++;
                renderPage();
                window.scrollTo(0, 0);
            }
        });

        async function init() {
            const comics = await fetchData();
            window.allComics = comics;

            findComicAndChapter();
            if (!currentChapter) {
                document.getElementById('pages-container').innerHTML = '<div class="loading">Chương không tồn tại</div>';
                return;
            }

            renderPage();
        }

        init();
    </script>
</body>
</html>
